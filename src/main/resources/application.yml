spring:
  profiles:
    active: dev
  application:
    name: adanext-backend
  h2:
    console:
      enabled: true
  datasource:
    url: jdbc:h2:mem:adanext
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: DEBUG
    com.adanext: DEBUG
